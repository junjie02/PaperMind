[project]
name = "deepresearch"
version = "0.1.0"
description = "Automated literature survey agent with multi-worker parallel search"
requires-python = ">=3.12"
dependencies = [
    "openai>=1.0.0",
    "aiosqlite>=0.20.0",
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
    "python-dotenv>=1.0.0",
]

[project.scripts]
deepresearch = "deepresearch.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/deepresearch"]
